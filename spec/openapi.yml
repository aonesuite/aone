components:
  responses:
    HTTPError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HTTPError"
      description: Error response
  schemas:
    HTTPError:
      additionalProperties: true
      properties:
        code:
          type: string
        error:
          type: string
      required:
      - code
      - error
      type: object
    handler_ListVoicesResponse:
      properties:
        voices:
          description: Voices is the list of available TTS voices.
          items:
            $ref: "#/components/schemas/handler_VoiceResponse"
          type: array
      type: object
    handler_SandboxDetailResponse:
      properties:
        api_key_id:
          description: APIKeyID is the ID of the API key that created the sandbox.
          type: string
        client_id:
          description: ClientID identifies this platform to SDK clients.
          type: string
        domain:
          description: Domain is the sandbox access domain returned by the provider.
          type: string
        end_at:
          description: EndAt is the scheduled or actual sandbox end time.
          format: date-time
          nullable: true
          type: string
        envd_access_token:
          description: EnvdAccessToken is the temporary access token required to connect to envd.
          type: string
        envd_sandbox_id:
          description: EnvdSandboxID is the sandbox ID used for envd and traffic proxy routing.
          type: string
        envd_version:
          description: EnvdVersion is the envd component version inside the sandbox.
          type: string
        sandbox_id:
          description: SandboxID is the sandbox instance ID.
          type: string
        started_at:
          description: StartedAt is the sandbox start time.
          format: date-time
          nullable: true
          type: string
        state:
          description: State is the current sandbox state.
          type: string
        template_id:
          description: TemplateID is the template used by the sandbox.
          type: string
        traffic_access_token:
          description: TrafficAccessToken is the temporary token required to access the sandbox traffic proxy.
          type: string
      type: object
    handler_SandboxLogsResponse:
      properties:
        log_entries:
          description: LogEntries is the structured log entry list field.
          items:
            $ref: "#/components/schemas/service_SandboxLogEntry"
          type: array
        logs:
          description: Logs is the legacy SDK-compatible log list field.
          items:
            $ref: "#/components/schemas/service_SandboxLogEntry"
          type: array
      type: object
    handler_SandboxMetricResponse:
      properties:
        cpu_count:
          description: CPUCount is the number of CPUs available to the sandbox.
          format: int32
          type: integer
        cpu_used_pct:
          description: CPUUsedPct is the CPU usage percentage.
          type: number
        disk_total:
          description: DiskTotal is the total disk space in bytes.
          format: int64
          type: integer
        disk_used:
          description: DiskUsed is the used disk space in bytes.
          format: int64
          type: integer
        mem_cache:
          description: MemCache is the cached memory in bytes.
          format: int64
          type: integer
        mem_total:
          description: MemTotal is the total memory in bytes.
          format: int64
          type: integer
        mem_used:
          description: MemUsed is the used memory in bytes.
          format: int64
          type: integer
        timestamp:
          description: Timestamp is the provider-formatted sample time.
          type: string
        timestamp_unix:
          description: TimestampUnix is the Unix timestamp for the sample time.
          format: int64
          type: integer
      type: object
    handler_SandboxNetworkRouteConfig:
      properties:
        allow_out:
          description: AllowOut lists outbound targets that are explicitly allowed.
          items:
            type: string
          type: array
        allow_public_traffic:
          description: AllowPublicTraffic controls whether public traffic may reach the sandbox.
          type: boolean
        deny_out:
          description: DenyOut lists outbound targets that are explicitly denied.
          items:
            type: string
          type: array
        mask_request_host:
          description: MaskRequestHost specifies the request host to mask or rewrite.
          type: string
      type: object
    handler_SandboxResponse:
      properties:
        client_id:
          description: ClientID identifies this platform to SDK clients.
          type: string
        domain:
          description: Domain is the sandbox access domain returned by the provider.
          type: string
        envd_access_token:
          description: EnvdAccessToken is the temporary access token required to connect to envd.
          type: string
        envd_sandbox_id:
          description: EnvdSandboxID is the sandbox ID used for envd and traffic proxy routing.
          type: string
        envd_version:
          description: EnvdVersion is the envd component version inside the sandbox.
          type: string
        sandbox_id:
          description: SandboxID is the sandbox instance ID.
          type: string
        template_id:
          description: TemplateID is the template used by the sandbox.
          type: string
        traffic_access_token:
          description: TrafficAccessToken is the temporary token required to access the sandbox traffic proxy.
          type: string
      type: object
    handler_SynthesizeResponse:
      properties:
        audio_url:
          description: AudioURL is a URL containing synthesized audio.
          type: string
        duration_ms:
          description: DurationMS is the optional audio duration in milliseconds.
          format: int32
          type: integer
      type: object
    handler_TemplateBuildLogsResponse:
      properties:
        logs:
          description: Logs is the structured build log entry list.
          items:
            $ref: "#/components/schemas/service_BuildLogEntry"
          type: array
      type: object
    handler_TemplateBuildStatusResponse:
      properties:
        build_id:
          description: BuildID is the template build ID.
          type: string
        envd_version:
          description: EnvdVersion is the envd version in the build artifact.
          type: string
        log_entries:
          description: LogEntries is the structured build log entry list.
          items:
            $ref: "#/components/schemas/service_BuildLogEntry"
          type: array
        logs:
          description: Logs is the legacy SDK-compatible text log list.
          items:
            type: string
          type: array
        status:
          description: Status is the build status.
          type: string
        template_id:
          description: TemplateID is the template ID.
          type: string
      type: object
    handler_TemplateResponse:
      properties:
        aliases:
          description: Aliases is the SDK-compatible template alias list.
          items:
            type: string
          type: array
        build_id:
          description: BuildID is the latest template build ID.
          type: string
        build_status:
          description: BuildStatus is the latest template build status.
          type: string
        cpu_count:
          description: CPUCount is the default CPU count for the template.
          format: int32
          type: integer
        created_at:
          description: CreatedAt is the template creation time.
          format: date-time
          nullable: true
          type: string
        deletable:
          description: Deletable indicates whether the current caller can delete the template.
          type: boolean
        disk_size_mb:
          description: DiskSizeMB is the default disk size in MB.
          format: int32
          type: integer
        editable:
          description: Editable indicates whether the current caller can edit the template.
          type: boolean
        envd_version:
          description: EnvdVersion is the envd version in the template build artifact.
          type: string
        memory_mb:
          description: MemoryMB is the default memory size in MB.
          format: int32
          type: integer
        names:
          description: Names is the template name list used by the console.
          items:
            type: string
          type: array
        public:
          description: Public indicates whether the template is publicly visible.
          type: boolean
        source:
          description: "Source identifies the template source: user template or platform default template."
          type: string
        template_id:
          description: TemplateID is the template ID.
          type: string
        updated_at:
          description: UpdatedAt is the latest template update time.
          format: date-time
          nullable: true
          type: string
      type: object
    handler_UpdateTemplateResponse:
      properties:
        names:
          description: Names returns the updated template name list.
          items:
            type: string
          type: array
      type: object
    handler_VoiceResponse:
      properties:
        gender:
          description: Gender is the provider-declared voice gender when available.
          type: string
        id:
          description: ID is the provider voice identifier used as the request `voice`.
          type: string
        language:
          description: Language is the primary voice language.
          type: string
        name:
          description: Name is the human-readable voice name.
          type: string
        scenario:
          description: Scenario describes the voice use case or style when available.
          type: string
      type: object
    handler_grantRequest:
      properties:
        actions:
          items:
            type: string
          type: array
        service:
          type: string
      type: object
    service_BuildLogEntry:
      properties:
        level:
          type: string
        message:
          type: string
        source:
          type: string
        timestamp:
          type: string
      type: object
    service_SandboxLogEntry:
      properties:
        fields:
          additionalProperties:
            type: string
          type: object
        level:
          type: string
        message:
          type: string
        timestamp:
          type: string
      type: object
info:
  title: AoneSuite Infra API
  version: 0.0.0
openapi: 3.0.3
paths:
  /api/v1/account/api-keys:
    get:
      description: APIKeyListAccount lists API keys visible in the current user's default organization.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_APIKeyListAccount
      parameters:
      - in: query
        name: limit
        schema:
          format: int32
          type: integer
      - in: query
        name: cursor
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: APIKeyListAccount lists API keys visible in the current user's default organization.
      x-public: false
  /api/v1/auth/login:
    post:
      description: AuthLogin authenticates an email/password login and sets the session cookie.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthLogin
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: AuthLogin authenticates an email/password login and sets the session cookie.
      x-public: false
  /api/v1/auth/logout:
    post:
      description: AuthLogout revokes the server-side session and clears the browser cookie.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthLogout
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: AuthLogout revokes the server-side session and clears the browser cookie.
      x-public: false
  /api/v1/auth/me:
    get:
      description: AuthMe returns the user profile for the current session.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthMe
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: AuthMe returns the user profile for the current session.
      x-public: false
  /api/v1/auth/oauth/{provider}/callback:
    get:
      description: AuthOAuthCallback validates OAuth state, exchanges the authorization code, and creates a session.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthOAuthCallback
      parameters:
      - in: path
        name: provider
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: AuthOAuthCallback validates OAuth state, exchanges the authorization code, and creates a session.
      x-public: false
  /api/v1/auth/oauth/{provider}/start:
    get:
      description: AuthOAuthStart starts an OAuth login by creating state, setting a cookie, and redirecting to the provider.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthOAuthStart
      parameters:
      - in: path
        name: provider
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: AuthOAuthStart starts an OAuth login by creating state, setting a cookie, and redirecting to the provider.
      x-public: false
  /api/v1/auth/register:
    post:
      description: AuthRegister creates a pending user account and sends a verification email.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthRegister
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: AuthRegister creates a pending user account and sends a verification email.
      x-public: false
  /api/v1/auth/resend-verification:
    post:
      description: |-
        AuthResendVerification resends an email verification message when needed.
        It returns the same response whether the account exists to avoid account enumeration.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthResendVerification
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: |-
        AuthResendVerification resends an email verification message when needed.
        It returns the same response whether the account exists to avoid account enumeration.
      x-public: false
  /api/v1/auth/verify-email:
    get:
      description: AuthVerifyEmail consumes an email verification token and activates the account.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_AuthVerifyEmail
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: AuthVerifyEmail consumes an email verification token and activates the account.
      x-public: false
  /api/v1/projects/{project_id}/api-keys:
    get:
      description: APIKeyList lists API keys in a project.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_APIKeyList
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
      - in: query
        name: limit
        schema:
          format: int32
          type: integer
      - in: query
        name: cursor
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: APIKeyList lists API keys in a project.
      x-public: false
    post:
      description: APIKeyCreate creates an API key and returns its one-time secret.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_APIKeyCreate
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                client_ip_allowlist:
                  items:
                    type: string
                  type: array
                expires_at:
                  format: date-time
                  nullable: true
                  type: string
                grants:
                  items:
                    $ref: "#/components/schemas/handler_grantRequest"
                  type: array
                name:
                  type: string
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: APIKeyCreate creates an API key and returns its one-time secret.
      x-public: false
  /api/v1/projects/{project_id}/api-keys/{id}:
    get:
      description: APIKeyGet returns details for a single API key.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_APIKeyGet
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: APIKeyGet returns details for a single API key.
      x-public: false
    patch:
      description: APIKeyUpdate updates an API key's name, expiration, allowlist, or grants.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_APIKeyUpdate
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
      - in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                client_ip_allowlist:
                  items:
                    type: string
                  type: array
                expires_at:
                  format: date-time
                  nullable: true
                  type: string
                grants:
                  items:
                    $ref: "#/components/schemas/handler_grantRequest"
                  type: array
                name:
                  type: string
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: APIKeyUpdate updates an API key's name, expiration, allowlist, or grants.
  /api/v1/projects/{project_id}/api-keys/{id}/revoke:
    post:
      description: APIKeyRevoke revokes an API key.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_APIKeyRevoke
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: APIKeyRevoke revokes an API key.
      x-public: false
  /api/v1/projects/{project_id}/api-keys/{id}/rotate:
    post:
      description: APIKeyRotate rotates an API key and returns the new one-time secret.
      operationId: github_com_aonesuite_infra_internal_aone_account_handler_(_Handler)_APIKeyRotate
      parameters:
      - in: path
        name: project_id
        required: true
        schema:
          type: string
      - in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                old_key_expires_in:
                  type: string
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: OK
      summary: APIKeyRotate rotates an API key and returns the new one-time secret.
      x-public: false
  /api/v1/sbx/sandboxes:
    get:
      description: ListSandboxes handles `GET /api/v1/sbx/sandboxes`.
      operationId: github_com_aonesuite_infra_internal_products_sandbox_handler_(_Module)_ListSandboxes
      parameters:
      - in: query
        name: api_key_id
        schema:
          description: APIKeyID filters by the API key that created the resource; empty means no API key filter.
          type: string
      - in: query
        name: template_id
        schema:
          description: TemplateID filters sandbox instances by template ID.
          type: string
      - in: query
        name: state
        schema:
          description: State filters sandbox instances by a comma-separated list of states.
          type: string
      - in: query
        name: cursor
        schema:
          description: Cursor is the pagination cursor.
          type: string
      - in: query
        name: limit
        schema:
          description: Limit is the maximum number of items to return.
          format: int32
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/handler_SandboxDetailResponse"
                type: array
          description: OK
        default:
          $ref: "#/components/responses/HTTPError"
      summary: ListSandboxes handles `GET /api/v1/sbx/sandboxes`.
    post:
      description: CreateSandbox handles `POST /api/v1/sbx/sandboxes`.
      operationId: github_com_aonesuite_infra_internal_products_sandbox_handler_(_Module)_CreateSandbox
      requestBody:
        content:
          application/json:
            schema:
              properties:
                allow_internet_access:
                  description: AllowInternetAccess controls public internet access; nil uses the provider default.
                  type: boolean
                env_vars:
                  additionalProperties:
                    type: string
                  description: EnvVars stores environment variables injected when creating the sandbox.
                  type: object
                metadata:
                  additionalProperties:
                    type: string
                  description: Metadata stores caller-provided sandbox metadata.
                  type: object
                network:
                  $ref: "#/components/schemas/handler_SandboxNetworkRouteConfig"
                secure:
                  description: Secure controls whether provider-specific secure isolation is enabled.
                  type: boolean
                template_id:
                  description: TemplateID selects the template used to create the sandbox.
                  type: string
                timeout:
                  description: Timeout sets the sandbox lifetime in seconds; 0 uses the provider default.
                  format: int32
                  type: integer
              type: object
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handler_SandboxResponse"
          description: Created
        default:
          $ref: "#/components/responses/HTTPError"
      summary: CreateSandbox handles `POST /api/v1/sbx/sandboxes`.
  /api/v1/sbx/sandboxes/{sandbox_id}:
    delete:
      description: DeleteSandbox handles `DELETE /api/v1/sbx/sandboxes/{sandbox_id}`.
      operationId: github_com_aonesuite_infra_internal_products_sandbox_handler_(_Module)_DeleteSandbox
      parameters:
      - in: path
        name: sandbox_id
        required: true
        schema:
          description: SandboxID is bound from the `:sandbox_id` route parameter.
          type: string
      responses:
        "200":
          description: OK
        default:
          $ref: "#/components/responses/HTTPError"
      summary: DeleteSandbox handles `DELETE /api/v1/sbx/sandboxes/{sandbox_id}`.
    get:
      description: GetSandbox handles `GET /api/v1/sbx/sandboxes/{sandbox_id}`.
      operationId: github_com_aonesuite_infra_internal_products_sandbox_handler_(_Module)_GetSandbox
      parameters:
      - in: path
        name: sandbox_id
        required: true
        schema:
          description: SandboxID is bound from the `:sandbox_id` route parameter.
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handler_SandboxDetailResponse"
          description: OK
        default:
          $ref: "#/components/responses/HTTPError"
      summary: GetSandbox handles `GET /api/v1/sbx/sandboxes/{sandbox_id}`.
  /api/v1/sbx/sandboxes/{sandbox_id}/connect:
    post:
      description: ConnectSandbox handles `POST /api/v1/sbx/sandboxes/{sandbox_id}/connect`.
      operationId: github_com_aonesuite_infra_internal_products_sandbox_handler_(_Module)_ConnectSandbox
      parameters:
      - in: path
        name: sandbox_id
        required: true
        schema:
          description: SandboxID is bound from the `:sandbox_id` route parameter.
          type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                timeout:
                  description: Timeout sets the sandbox lifetime in seconds after connecting; negative values are treated as 0.
                  format: int32
                  type: integer
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handler_SandboxResponse"
          description: OK
        default:
          $ref: "#/components/responses/HTTPError"
      summary: ConnectSandbox handles `POST /api/v1/sbx/sandboxes/{sandbox_id}/connect`.
  /api/v1/sbx/sandboxes/{sandbox_id}/logs:
    get:
      description: GetSandboxLogs handles `GET /api/v1/sbx/sandboxes/{sandbox_id}/logs`.
      operationId: github_com_aonesuite_infra_internal_products_sandbox_handler_(_Module)_GetSandboxLogs
      parameters:
      - in: path
        name: sandbox_id
        required: true
        schema:
          description: SandboxID is bound from the `:sandbox_id` route parameter.
          type: string
      - in: query
        name: cursor
        schema:
          description: Cursor is the provider log cursor.
          format: int64
          type: integer
      - in: query
        name: direction
        schema:
          description: Direction controls log pagination direction.
          type: string
      - in: query
        name: level
        schema:
          description: Level filters logs by severity level.
          type: string
      - in: query
        name: limit
        schema:
          description: Limit is the maximum number of items to return.
          format: int32
          type: integer
      - in: query
        name: search
        schema:
          description: Search filters logs by content keyword.
          type: string
      - in: query
        name: start
        schema:
          description: Start specifies the log query start time or provider start cursor.
          format: int64
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handler_SandboxLogsResponse"
          description: OK
        default:
          $ref: "#/components/responses/HTTPError"
      summary: GetSandboxLogs handles `GET /api/v1/sbx/sandboxes/{sandbox_id}/logs`.
  /api/v1/sbx/sandboxes/{sandbox_id}/metrics:
    get:
      description: GetSandboxMetrics handles `GET /api/v1/sbx/sandboxes/{sandbox_id}/metrics`.
